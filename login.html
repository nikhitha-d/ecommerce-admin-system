<!DOCTYPE html>
<html>
<head>
    <title>Login_E-commerce Admin System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            font-family: Arial, sans-serif;
        }

        .login-box {
            width: 400px;
            margin: 100px auto;
            background: #fff;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.2);
        }

        .login-title {
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            color: #333;
        }

        .form-control {
            height: 45px;
            border-radius: 6px;
        }

        .btn-login {
            width: 100%;
            height: 45px;
            font-size: 16px;
            border-radius: 6px;
            background: #5cb85c;
            border: none;
        }

        .btn-login:hover {
            background: #4cae4c;
        }

        .footer-text {
            text-align: center;
            margin-top: 15px;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 class="login-title">Admin Login</h2>

        <form action="/login" method="POST">

    <div class="form-group">
        <input type="email" class="form-control" name="email" placeholder="Enter email" required>
    </div>

    <div class="form-group">
        <input type="password" class="form-control" name="password" placeholder="Enter password" required>
    </div>

    <!-- 🔥 Forgot + Signup in same line -->
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <a href="#" onclick="showForgot()">Forgot Password?</a>
        <a href="/signup.html">Sign Up</a>
    </div>

    <!-- Forgot Password Box -->
    <div id="forgotBox" style="display:none; margin-bottom:15px; padding:15px; border:1px solid #eee; border-radius:8px; background:#fafafa;">
        <div class="form-group">
            <input type="email" id="forgotEmail" class="form-control" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <input type="password" id="newPassword" class="form-control" placeholder="New Password">
        </div>
        <button type="button" class="btn btn-warning btn-block" onclick="resetPassword()">Reset Password</button>
    </div>

    <button type="submit" class="btn btn-success btn-login">Login</button>

</form>

        <p class="footer-text">E-commerce Admin System</p>
    </div>
    <script>
        function showForgot() {
            document.getElementById("forgotBox").style.display = "block";
        }

        function resetPassword() {
            const email = document.getElementById("forgotEmail").value;
            const password = document.getElementById("newPassword").value;

            if (!email || !password) {
                alert("Please fill all fields");
                return;
            }

            fetch('/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(res => res.text())
            .then(msg => {
                alert(msg);
                document.getElementById("forgotBox").style.display = "none";
            })
            .catch(err => console.log(err));
        }
</script>
</body>
</html>
