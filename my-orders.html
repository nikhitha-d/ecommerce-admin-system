<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>

<body>

<div class="container">
    <nav class="navbar navbar-default">
  <div class="container-fluid">
    
    <div class="navbar-header">
      <a class="navbar-brand">🛍️ My Shop</a>
    </div>

    <ul class="nav navbar-nav navbar-right">
      <li>
        <a href="shop.html">🛒 Shop</a>
      </li>
      <li>
        <a href="#" onclick="logout()">🚪 Logout</a>
      </li>
    </ul>

  </div>
</nav>

    <h2 class="text-center">📦 My Orders</h2>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Status</th>
                <th>Action</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
    </table>
</div>

<script>
function loadOrders() {
    fetch('/my-orders')
        .then(res => res.json())
        .then(data => {
            let table = document.getElementById("ordersTable");
            table.innerHTML = "";

            if (data.length === 0) {
                table.innerHTML = "<tr><td colspan='4'>No orders found</td></tr>";
                return;
            }

            data.forEach(o => {
                table.innerHTML += `
                    <tr>
                        <td>${o.product}</td>
                        <td>${o.quantity}</td>
                        <td>₹${o.total_amount}</td>
                        <td>${o.order_status}</td>
                        <td>
                            ${o.order_status === "Placed" 
                                ? `<button class="btn btn-danger btn-xs" onclick="cancelOrder(${o.id})">Cancel</button>` 
                                : "—"}
                        </td>
                        <td>${new Date(o.created_at).toLocaleDateString()}</td>
                    </tr>
                `;
            });
        });
}

function cancelOrder(id) {
    if (confirm("Cancel this order?")) {
        fetch('/cancel-order/' + id)
            .then(res => res.text())
            .then(msg => {
                alert(msg);
                loadOrders();
            });
    }
}
//logout
function logout() {
    // remove user (local storage)
    localStorage.removeItem("user");

    // backend logout (if using session)
    fetch('/logout')
        .then(() => {
            window.location.href = "login.html";
        })
        .catch(() => {
            window.location.href = "login.html";
        });
}

window.onload = loadOrders;
</script>

</body>
</html>
