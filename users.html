<!DOCTYPE html>
<html>
    <head>
        <title>Users_E-Commerce Admin System</title>
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
        <style>
            body{
                font-family: Arial,sans-serif;
                background:#f4f6f9;
            }
            .navbar{
                margin-bottom: 0;
                border-radius: 0;
            }
            .sidebar{
                background:#2c3e50;
                min-height:100vh;
                color:white;
                padding-top: 20px;
            }
            .sidebar h3{
                text-align: center;
                margin-bottom: 30px;
                font-weight: bold;
            }
            .sidebar a{
                display:block;
                color:#ddd;
                padding: 12px 20px;
                text-decoration: none;
                font-size: 16px;
            }
            .sidebar a:hover{
                background: #1abc9c;
                color: white;
                text-decoration: none;
            }
            .main-content{
                padding:30px;
            }
            .card-box{
                background: white;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0px 2px 8px rgba(0,0,0,0.08);
                margin-bottom: 25px;
            }
            .btn-space{
                margin-right: 5px;
            }
            .table>tbody>tr>td{
                vertical-align: middle;
            }
            .form-inline .form-control{
                margin-right: 10px;
                margin-bottom: 10px;
            }
            .page-title{
                margin-bottom: 20px;
            }
            .form-row {
                margin-bottom: 15px;
            }
            .form-control {
                margin-bottom: 10px;
            }
            .btn {
                margin-top: 10px;
            }
        </style>
    </head>

<script>
function loadUsers() {
    fetch('/get-users')
        .then(res => res.json())
        .then(data => {
            let table = document.getElementById("userTableBody");
            table.innerHTML = "";

            data.forEach(user => {
                table.innerHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.role}</td>
                        <td>
                            <button class="btn btn-primary btn-xs" 
                                onclick="editUser(${user.id}, '${user.name}', '${user.email}', '${user.role}')">
                                Edit
                            </button>

                            <button class="btn btn-danger btn-xs"
                                onclick="deleteUser(${user.id})">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
            });
        });
}
// DELETE USER
function deleteUser(id) {
    if (confirm("Are you sure you want to delete this user?")) {
        fetch(`/delete-user/${id}`)
            .then(() => {
                loadUsers(); // refresh table
            });
    }
}
// EDIT USER (fills form)
function editUser(id, name, email, role) {
    document.querySelector('input[name="name"]').value = name;
    document.querySelector('input[name="email"]').value = email;
    document.querySelector('input[name="role"]').value = role;

    document.querySelector("form").action = `/update-user/${id}`;
}
// Load users on page load
window.onload = function() {
    loadUsers();
    loadUserStats();
};
//display number
function loadUserStats() {
    fetch('/user-stats')
        .then(res => res.json())
        .then(data => {
            let statsDiv = document.getElementById("userStats");
            statsDiv.innerHTML = "";

            data.forEach(item => {
                statsDiv.innerHTML += `
                    <p><strong>${item.role}</strong>: ${item.count}</p>
                `;
            });
        });
}
</script>


    <body>
        <nav class="navbar navbar-inverse">
            <div class="container-fluid">
                <div class="navbar-header">
                    <a class="navbar-brand" href="dashboard.html">E-Commerce Admin</a>
                </div>
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="#"><span class="glyphicon glyphicon-user"></span>Admin</a></li>
                    <li><a href="login.html"><span class="glyphicon glyphicon-log-out"></span>Logout</a></li>
                </ul>
            </div>
        </nav>

        <div class="container-fluid">
            <div class="row">
                <div class="col-sm-3 col-md-2 sidebar">
                    <h3>Admin Panel</h3>
                    <a href="dashboard.html">Dashboard</a>
                    <a href="users.html">Users</a>
                    <a href="products.html">Products</a>
                    <a href="orders.html">Orders</a>
                    <a href="categories.html">Categories</a>
                    <a href="reports.html">Reports</a>
                    <a href="notifications.html">Notifications</a>
                </div>

                <div class="col-sm-9 col-md-10 main-content">
                    <h2 class="page-title">Users Management</h2>
                    <div class="card-box">
                        <h3>Add New User</h3>
                            <form action="/add-user" method="post" id="userForm">
                            <div class="row form-row">
                                <div class="col-md-3">
                                    <input type="text" class="form-control" placeholder="Enter Name" name="name" required>
                                </div>
                                <div class="col-md-3">
                                    <input type="email" class="form-control" placeholder="Enter Email" name="email" required>
                                </div>
                                <div class="col-md-3">
                                    <input type="text" class="form-control" placeholder="Enter Role" name="role" required>
                                </div>
                                <div class="col-md-3">
                                    <input type="password" class="form-control" placeholder="Enter Password" name="password" required>
                                </div>
                                <div class="col-md-3">
                                    <input type="password" class="form-control" placeholder="Confirm Password" name="confirm_password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success">Save User</button>
                            </form>
                    </div>

                    <div class="card-box">
                        <h3>User Role Statistics</h3>
                        <div id="userStats"></div>
                    </div>

                    <div class="card-box">
                        <h3>User List</h3>
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover" id="userTable">
                                <thead>
                                    <tr class="info">
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="userTableBody">
                                </tbody>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </body>

</html>
