<!DOCTYPE html>
<html>
<head>
    <title>Settings_E-Commerce Admin System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .navbar {
            margin-bottom: 0;
            border-radius: 0;
        }

        .sidebar {
            background: #2c3e50;
            min-height: 100vh;
            color: white;
            padding-top: 20px;
        }

        .sidebar h3 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .sidebar a {
            display: block;
            color: #ddd;
            padding: 12px 20px;
            text-decoration: none;
            font-size: 16px;
        }

        .sidebar a:hover {
            background: #1abc9c;
            color: white;
            text-decoration: none;
        }

        .main-content {
            padding: 30px;
        }

        .card-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .page-title {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .checkbox {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-inverse">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="dashboard.html">E-Commerce Admin</a>
            </div>
            <ul class="nav navbar-nav navbar-right">
                <li><a href="#"><span class="glyphicon glyphicon-user"></span> Admin</a></li>
                <li><a href="login.html"><span class="glyphicon glyphicon-log-out"></span> Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">

            <div class="col-sm-3 col-md-2 sidebar">
                <h3>Admin Panel</h3>
                <a href="dashboard.html">Dashboard</a>
                <a href="users.html">Users</a>
                <a href="products.html">Products</a>
                <a href="orders.html">Orders</a>
                <a href="categories.html">Categories</a>
                <a href="reports.html">Reports</a>
                <a href="notifications.html">Notifications</a>
                
            </div>

            <div class="col-sm-9 col-md-10 main-content">
                <h2 class="page-title">Settings</h2>

                <div class="card-box">
                    <h3>Profile Settings</h3>
                    <form action="/update-profile" method="post">
                        <div class="form-group">
                            <label>Admin Name</label>
                            <input type="text" class="form-control" value="Admin">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" class="form-control" value="admin@gmail.com">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </form>
                </div>

                <div class="card-box">
                    <h3>Change Password</h3>
                    <form action="/change-password" method="post">
                        <div class="form-group">
                            <label>Current Password</label>
                            <input type="password" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-warning">Update Password</button>
                    </form>
                </div>

                <div class="card-box">
                    <h3>System Settings</h3>
                    <form action="/update-settings" method="post">

                        <div class="checkbox">
                            <label>
                                <input type="checkbox" checked> Enable Email Notifications
                            </label>
                        </div>

                        <div class="checkbox">
                            <label>
                                <input type="checkbox" checked> Enable SMS Notifications
                            </label>
                        </div>

                        <div class="form-group">
                            <label>Theme</label>
                            <select class="form-control">
                                <option>Light</option>
                                <option>Dark</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-success">Save Settings</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
