<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .center-box {
      width: 300px;
      margin: 100px auto; 
      padding: 20px;
      background: white;
      border-radius: 5px;
      box-shadow: 0px 0px 10px #ccc;
    }
  </style>
</head>

<body>

<div class="center-box">
  <h3 class="text-center">Sign Up</h3>
  <input type="text" id="name" class="form-control" placeholder="Name"><br>
  <input type="email" id="email" class="form-control" placeholder="Email"><br>
  <input type="password" id="password" class="form-control" placeholder="Password"><br>

  <div class="text-center">
    <button class="btn btn-success" onclick="signup()">Sign Up</button>
  </div>

  <p class="text-center" style="margin-top:10px;">
    Already have an account? <a href="login.html">Login</a>
  </p>
</div>

<script>
function signup() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!name || !email || !password) {
    alert("Please fill all fields");
    return;
  }

  fetch('/register', {
    method: 'POST',
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email, password })
  })
  .then(res => res.text())
  .then(data => {
    alert(data);

    if (data.includes("successful")) {
      window.location.href = "login.html";
    }
  })
  .catch(err => {
    console.log(err);
    alert("Error connecting to server");
  });
}
</script>
</body>
</html>
