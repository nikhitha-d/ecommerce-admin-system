<!DOCTYPE html>
<html>
<head>
    <title>Shop</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial;
        }

        #productContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: flex-start;
        }

        .product-box {
            width: 23%;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);

            height: 320px; /* fixed */
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
       
        .product-card h4 {
            font-size: 14px;
            height: 40px;
            overflow: hidden;
        }.product-card h4,.product-card p {
            margin: 4px 0;
        }
        .product-img {
            width: 100%;
            height: 150px;
            object-fit: contain; /* better than cover here */
        }
        .product-card button {
            margin-top: auto;
        }
    </style>
</head>

<body>

<div class="container">
    <nav class="navbar navbar-default">
  <div class="container-fluid">
    
    <div class="navbar-header">
      <a class="navbar-brand">🛍️ My Shop</a>
    </div>

    <ul class="nav navbar-nav navbar-right">
      <li>
        <a href="my-orders.html">📦 My Orders</a>
      </li>
      <li>
        <a href="#" onclick="logout()">🚪 Logout</a>
      </li>
    </ul>

  </div>
</nav>

    <h2 class="text-center">🛍️ Shop Products</h2>

    <div class="text-center" style="margin-bottom:20px;">
    <input type="text" id="searchInput" placeholder="Search products..." class="form-control" style="width:300px; display:inline;">
    <button onclick="searchProducts()" class="btn btn-primary">Search</button>
</div>
    <div id="productContainer" style="display:flex; flex-wrap:wrap; gap:20px;"></div>
</div>

<script>

function renderProducts(data) {
    let container = document.getElementById("productContainer");
    container.innerHTML = "";

    if (data.length === 0) {
        container.innerHTML = "<h3>No products found</h3>";
        return;
    }

    data.forEach(p => {
        container.innerHTML += `
            <div class="product-box">
                <div class="product-card">
                    <img src="/uploads/${p.image}" class="product-img">

                    <h4>${p.product_name}</h4>
                    ${p.category ? p.category : ""}

                    <h4>₹${p.price}</h4>

                    <button class="btn btn-primary"
                        onclick="placeOrder(${p.id}, '${p.product_name}', ${p.price})">
                        Order
                    </button>
                </div>
            </div>
        `;
    });
}

function loadProducts() {
    fetch('/get-products')
        .then(res => res.json())
        .then(data => {
            console.log("DATA:", data); // 🔥 IMPORTANT
            renderProducts(data);
        });
}

//search products
function searchProducts() {
    let value = document.getElementById("searchInput").value;

    if (value.trim() === "") {
        loadProducts();
        return;
    }

    fetch('/search-product?search=' + value)
        .then(res => res.json())
        .then(data => renderProducts(data));
}

//place order
function placeOrder(productId, productName, price) {

    const orderData = {
    product: productName,
    quantity: 1,
    total_amount: price
};

    fetch('/add-order', {
        method: 'POST',
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(orderData)
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        window.location.href = "my-orders.html"; // 🔥 redirect
    })
    .catch(err => console.log(err));
}

//Logout
function logout() {
    // if using localStorage
    localStorage.removeItem("user");

    // if using session
    fetch('/logout')
        .then(() => {
            window.location.href = "login.html";
        })
        .catch(() => {
            window.location.href = "login.html";
        });
}

// 🚀 CALL FUNCTION
window.onload = loadProducts;
</script>

</body>
</html>
